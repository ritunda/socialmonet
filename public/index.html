<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialMonet - Monetize Your Facebook Engagement</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 SocialMonet</h1>
        <p class="tagline">Any Facebook post with 100+ likes = 💵 in your pocket</p>
        
        <div id="auth-section">
            <div class="card">
                <h2>Get Started</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="signUp()">Sign Up</button>
                <button onclick="signIn()" class="secondary">Sign In</button>
                <div class="divider">or</div>
                <button onclick="googleSignIn()" class="google-btn">Continue with Google</button>
            </div>
        </div>
        
        <div id="dashboard-link" style="display:none;">
            <a href="dashboard.html">Go to Dashboard →</a>
        </div>
    </div>
    
    <script>
        let currentUser = null;
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dashboard-link').style.display = 'block';
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('dashboard-link').style.display = 'none';
            }
        });
        
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                alert('Account created! Redirecting...');
            } catch(err) {
                alert(err.message);
            }
        }
        
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch(err) {
                alert(err.message);
            }
        }
        
        async function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch(err) {
                alert(err.message);
            }
        }
    </script>
</body>
</html>
